# Kamal deploy config for Production VPS (your-vps.example.com).
#
# VPS quirks:
# - Public port 20215 → internal 20215 (the only TCP/UDP port exposed to the internet).
# - SSH on port 10215 (not 22).
# - LXC, not OpenVZ — Docker 29.x works fine.
# - 1 GB RAM, 1 CPU — tuned for minimal footprint (single Puma worker, 3 threads).
# - No SSL (LE would need port 80/443 which VPS doesn't expose). HTTP only.

service: gig-coordinator

# Image stored in GitHub Container Registry. Requires a PAT with write:packages.
image: your-username/gig-coordinator

servers:
  web:
    - your-vps.example.com

ssh:
  port: 10215
  user: root

# Two hosts are registered so Kamal Proxy matches both URLs:
# - your-vps.example.com    → plain HTTP on :20215 (direct IPv4)
# - your-domain.example.com → HTTPS on :443, terminated by edge reverse proxy
#   (edge front-ends TLS and forwards HTTP to [IPv6]:20215).
# SSL stays off on Kamal Proxy itself — LE would need port 80 or 443 externally
# reachable, and edge front-ends neither on IPv4. production.rb sets
# assume_ssl so Rails trusts X-Forwarded-Proto for the your-domain.example.com path.
proxy:
  hosts:
    - your-vps.example.com
    - your-domain.example.com
  app_port: 80
  ssl: false
  run:
    http_port: 20215

registry:
  server: ghcr.io
  username: your-username
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    # Tune Puma for 1 GB / 1 CPU — one process, 5 threads (the pool size needs
    # to cover Solid Queue's workers running in-Puma; fewer threads → Solid
    # Queue exits with "connection pool too small" and takes Puma down with it).
    WEB_CONCURRENCY: 0
    RAILS_MAX_THREADS: 5

    # Run Solid Queue inside Puma (no separate `job:` host, we only have one VPS).
    SOLID_QUEUE_IN_PUMA: true

    # Primary public URL — mailer links and absolute route helpers build on this.
    # edge front-ends TLS and forwards to our IPv6:20215, so protocol is https
    # and no port (default 443) is needed.
    PUBLIC_HOST: your-domain.example.com
    PUBLIC_PROTOCOL: https

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persist SQLite dbs + Active Storage files across deploys.
volumes:
  - "gig-coordinator_storage:/rails/storage"

# Avoid in-flight 404s on stylesheet/js when a new deploy rotates the asset digest.
asset_path: /rails/public/assets

builder:
  arch: amd64
