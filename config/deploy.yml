# Kamal deploy config for Production VPS (your-vps.example.com).
#
# VPS quirks:
# - Public port 20215 → internal 20215 (the only TCP/UDP port exposed to the internet).
# - SSH on port 10215 (not 22).
# - LXC, not OpenVZ — Docker 29.x works fine.
# - 1 GB RAM, 1 CPU — tuned for minimal footprint (single Puma worker, 3 threads).
# - No SSL (LE would need port 80/443 which VPS doesn't expose). HTTP only.

service: gig-coordinator

# Image stored in GitHub Container Registry. Requires a PAT with write:packages.
image: your-username/gig-coordinator

servers:
  web:
    - your-vps.example.com

ssh:
  port: 10215
  user: root

# Kamal Proxy listens on the one public port VPS gives us (20215) and routes to
# the Thruster/Rails container on its internal :80. SSL off — LE can't issue certs
# without port 80 or 443 being externally reachable, and edge front-ends neither.
proxy:
  host: your-vps.example.com
  app_port: 80
  ssl: false
  run:
    http_port: 20215

registry:
  server: ghcr.io
  username: your-username
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    # Tune Puma for 1 GB / 1 CPU — one process, a handful of threads.
    WEB_CONCURRENCY: 0
    RAILS_MAX_THREADS: 3

    # Run Solid Queue inside Puma (no separate `job:` host, we only have one VPS).
    SOLID_QUEUE_IN_PUMA: true

    # Host + port used by mailer URLs and route helpers generating absolute URLs.
    PUBLIC_HOST: your-vps.example.com
    PUBLIC_PORT: "20215"
    PUBLIC_PROTOCOL: http

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persist SQLite dbs + Active Storage files across deploys.
volumes:
  - "gig-coordinator_storage:/rails/storage"

# Avoid in-flight 404s on stylesheet/js when a new deploy rotates the asset digest.
asset_path: /rails/public/assets

builder:
  arch: amd64
